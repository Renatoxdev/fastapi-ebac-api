name: Python application with Poetry and Docker Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  IMAGE_NAME: fastapi-app
  IMAGE_TAG: latest

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Poetry
      run: |
        pip install poetry
        poetry config virtualenvs.in-project true

    - name: Cache Poetry virtualenv
      uses: actions/cache@v3
      with:
        path: ./.venv
        key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
        restore-keys: |
          ${{ runner.os }}-poetry-

    - name: Install dependencies
      run: poetry install --no-root --no-interaction

    - name: Run Tests
      run: poetry run pytest
    
    - name: Build Docker Image
      run: |
        docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .

    - name: Test Docker Container Run
      run: |
        docker run -d -p 8000:8000 --name test-container ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
        
        sleep 3
        
        if [ "$(docker inspect -f '{{.State.Running}}' test-container)" = "false" ]; then
          echo "Erro: O container falhou ao inicializar!"
          docker logs test-container
          exit 1
        fi
        
        docker rm -f test-container